<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUBJECTS = ["Anatomy","Physiology","Biochemistry","Pathology","Pharmacology","Microbiology","Forensic Medicine","Community Medicine","ENT","Ophthalmology","Medicine","Surgery","Obstetrics","Gynaecology","Pediatrics","Orthopedics","Radiology","Anesthesia","Psychiatry"];
const TIME_SLOTS = Array.from({length:24},(_,i)=>{
  const s=`${String(i).padStart(2,"0")}:00`;
  const e=i===23?"00:00":`${String(i+1).padStart(2,"0")}:00`;
  return {key:`${s}-${e}`,label:`${s} – ${e}`,hour:i};
});
const getToday=()=>new Date().toISOString().split("T")[0];
const TABS=["📅 Daily","📖 Reading","🧪 QBank","📊 Reports","⚙️ Settings"];
const isWeekend=()=>{const d=new Date().getDay();return d===0||d===6;};

// ── PWA INSTALL PROMPT ──
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  // Notify React app
  window.dispatchEvent(new CustomEvent('pwa-installable'));
  console.log('[TargetPG] Install prompt ready');
});
window.addEventListener('appinstalled', () => {
  _installPrompt = null;
  window.dispatchEvent(new CustomEvent('pwa-installed'));
  console.log('[TargetPG] App installed!');
});
const triggerInstall = async () => {
  if(!_installPrompt){ alert('Install option abhi available nahi hai.\n\nChrome ⋮ menu → "Add to Home Screen" try karo.'); return; }
  _installPrompt.prompt();
  const result = await _installPrompt.userChoice;
  if(result.outcome === 'accepted') _installPrompt = null;
};
let _swReg = null;

const SW_SOURCE = `
const DB_NAME = 'medtracker-sw-db';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore('s',{keyPath:'k'});r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej(r.error);});}
async function dbGet(k){try{const db=await openDB();return new Promise(res=>{const r=db.transaction('s','readonly').objectStore('s').get(k);r.onsuccess=()=>res(r.result?r.result.v:null);r.onerror=()=>res(null);});}catch{return null;}}
async function dbSet(k,v){try{const db=await openDB();return new Promise(res=>{const tx=db.transaction('s','readwrite');tx.objectStore('s').put({k,v});tx.oncomplete=res;tx.onerror=res;});}catch{}}
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>{e.waitUntil(clients.claim().then(()=>scheduleCheck()));});
self.addEventListener('message',async e=>{
  if(!e.data)return;
  if(e.data.type==='SCHEDULE_UPDATE'){
    await dbSet('wakeHour',e.data.wakeHour??8);
    await dbSet('sleepHour',e.data.sleepHour??1);
    await dbSet('notifEnabled',e.data.notifEnabled??true);
    await dbSet('cheatDays',e.data.cheatDays??{});
    const cl=await clients.matchAll({type:'window'});
    cl.forEach(c=>c.postMessage({type:'SW_READY'}));
  }
});
function scheduleCheck(){
  const now=new Date();
  const ms=(60-now.getSeconds())*1000-now.getMilliseconds()+500;
  setTimeout(async()=>{await doCheck();scheduleCheck();},ms);
}
async function doCheck(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes();
  if(m>3)return;
  const wakeH=(await dbGet('wakeHour'))??8;
  const sleepH=(await dbGet('sleepHour'))??1;
  const enabled=(await dbGet('notifEnabled'))??false;
  const cheats=(await dbGet('cheatDays'))??{};
  const last=(await dbGet('lastH'))??-1;
  if(!enabled)return;
  const today=new Date().toISOString().split('T')[0];
  if(cheats[today])return;
  if(h===last)return;
  const active=sleepH<wakeH?(h>=wakeH||h<sleepH):(h>=wakeH&&h<sleepH);
  if(!active)return;
  await dbSet('lastH',h);
  const cl=await clients.matchAll({type:'window',includeUncontrolled:true});
  if(cl.some(c=>c.visibilityState==='visible'))return;
  const pH=(h-1+24)%24;
  const lbl=String(pH).padStart(2,'0')+':00 – '+String(h).padStart(2,'0')+':00';
  self.registration.showNotification('⏰ '+lbl+' | TargetPG',{
    body:'Kya kiya is ghante? Tap karo aur fill karo! 📝',
    icon:'https://abhivanshsomvanshi-oss.github.io/Targetpg/icon-192.png',
    badge:'https://abhivanshsomvanshi-oss.github.io/Targetpg/icon-192.png',
    tag:'hourly-log',renotify:true,requireInteraction:true,
    vibrate:[200,100,200,100,400],
    data:{url:'https://abhivanshsomvanshi-oss.github.io/Targetpg/'}
  });
}
self.addEventListener('notificationclick',e=>{
  e.notification.close();
  const url=(e.notification.data&&e.notification.data.url)||'https://abhivanshsomvanshi-oss.github.io/Targetpg/';
  e.waitUntil(clients.matchAll({type:'window',includeUncontrolled:true}).then(cl=>{
    for(const c of cl){if('focus' in c)return c.focus();}
    return clients.openWindow(url);
  }));
});
`;

const registerSW = async () => {
  if(!('serviceWorker' in navigator)) return null;
  try {
    // Create SW from blob — works without separate sw.js file
    const blob = new Blob([SW_SOURCE], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    _swReg = await navigator.serviceWorker.register(swUrl);
    console.log('[TargetPG] SW registered via blob');
    return _swReg;
  } catch(err) {
    console.warn('[TargetPG] SW blob failed:', err.message);
    // Fallback: try sw.js file
    try {
      _swReg = await navigator.serviceWorker.register('./sw.js');
      console.log('[TargetPG] SW registered via file');
      return _swReg;
    } catch(err2) {
      console.warn('[TargetPG] SW file also failed:', err2.message);
      return null;
    }
  }
};

const requestNotifPermission = async () => {
  if(!("Notification" in window)) return false;
  if(Notification.permission === "granted") return true;
  const p = await Notification.requestPermission();
  return p === "granted";
};

const sendBrowserNotif = (title, body) => {
  if(Notification.permission !== "granted"){
    alert("Pehle notifications enable karo Settings mein!");
    return;
  }
  if(_swReg && _swReg.active) {
    _swReg.showNotification(title, {
      body,
      icon: 'https://abhivanshsomvanshi-oss.github.io/Targetpg/icon-192.png',
      tag: 'test-notif',
      requireInteraction: true,
      vibrate: [200, 100, 200]
    }).catch(() => new Notification(title, {body}));
  } else {
    new Notification(title, {body});
  }
};

const updateSWSchedule = async (wakeHour, sleepHour, notifEnabled, cheatDays) => {
  const payload = {
    type: 'SCHEDULE_UPDATE',
    wakeHour: wakeHour ?? 8,
    sleepHour: sleepHour ?? 1,
    notifEnabled: notifEnabled ?? true,
    cheatDays: cheatDays ?? {}
  };
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage(payload);
  } else if (_swReg) {
    const sw = _swReg.active || _swReg.waiting || _swReg.installing;
    if (sw) sw.postMessage(payload);
  }
};

// Register SW on load
registerSW().then(reg => {
  if(reg) console.log('[TargetPG] SW ready');
});

// Listen for SW_LOG_SAVED — when user replies via notification
if('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'SW_LOG_SAVED') {
      // Dispatch custom event so React app can pick it up
      window.dispatchEvent(new CustomEvent('sw-log-saved', { detail: e.data }));
    }
  });
}

function App(){
  const [tab,setTab]=useState(0);
  const [canInstall,setCanInstall]=useState(!!_installPrompt);
  const [installed,setInstalled]=useState(window.matchMedia('(display-mode: standalone)').matches);
  useEffect(()=>{
    const onInstallable=()=>setCanInstall(true);
    const onInstalled=()=>{setCanInstall(false);setInstalled(true);};
    window.addEventListener('pwa-installable',onInstallable);
    window.addEventListener('pwa-installed',onInstalled);

      const text=await callAI(prompt,imgs,1200);
      setScreenshotAnalysis(text);
      const today=getToday();
      setQbankData(prev=>({...prev,[today]:[...(prev[today]||[]),{date:today,subject:"Mixed (SS)",topic:`Screenshot Batch – ${files.length} imgs`,total:files.length,wrong:files.length,notes:text.substring(0,300),id:Date.now()}]}));

    setSsLoading(false);

        prompt=`NEET PG Daily Report – ${today}\nLogs:\n${logText}\nReading: ${rdT.reduce((s,e)=>s+e.pages,0)}pg\nQBank:\n${qT.map(e=>`${e.subject}/${e.topic}: ${e.wrong}/${e.total}W`).join("\n")||"None"}\nHinglish: Summary, Wins, Problems, Kal ka plan. Direct.`;
      }else if(reportType==="weekly"){
        const allD=Object.keys(logs).sort().slice(-7);
        const weekPg=allD.flatMap(d=>readingData[d]||[]).reduce((s,e)=>s+e.pages,0);
        const weekQ=allD.flatMap(d=>qbankData[d]||[]);
        const ss={};weekQ.forEach(e=>{if(!ss[e.subject])ss[e.subject]={w:0,t:0};ss[e.subject].w+=e.wrong;ss[e.subject].t+=e.total;});
        prompt=`NEET PG Weekly Report (last 7 days)\nPages: ${weekPg}\nActivity: ${allD.map(d=>`${d}: ${Object.values(logs[d]).filter(Boolean).length} slots`).join(", ")}\nQBank:\n${Object.entries(ss).map(([s,{w,t}])=>`${s}: ${w}/${t}W`).join("\n")||"None"}\nHinglish: Score/10, Top 3 weak topics, Next week plan. Motivating.`;
      }else{
        const allQ=Object.values(qbankData).flat();
        const totalPg=Object.values(readingData).flat().reduce((s,e)=>s+e.pages,0);
        prompt=`NEET PG Monthly Report\nPages: ${totalPg} | QBank: ${allQ.reduce((s,e)=>s+e.total,0)}Qs\nReading:\n${getReadingSummaryForReport(null)}\nHinglish: Overview, Top 5 weak topics, Revision roadmap. Detailed.`;

    await new Promise(resolve => {
      if(reg.active){ resolve(); return; }
      const sw = reg.installing || reg.waiting;
      if(!sw){ resolve(); return; }
      sw.addEventListener('statechange', function handler(){
        if(sw.state === 'activated'){ sw.removeEventListener('statechange', handler); resolve(); }
      });
      setTimeout(resolve, 3000);
    });

        )}
        {installed&&(
          <div style={{...s.card,background:"#040d04",border:"1px solid #166534",padding:"10px"}}>
            <span style={{color:"#4ade80",fontSize:"12px"}}>✅ TargetPG installed hai as PWA!</span>
          </div>
        )}

        <div style={s.card}>
          <label style={s.lbl}>🔔 Hourly Reminders</label>
          <div style={{marginBottom:"8px"}}>
            <label style={s.lbl}>Wake-up Time (reminders isi se start honge)</label>
            <input type="time" value={wakeTime} onChange={e=>{const v=e.target.value;setWakeTime(v);localStorage.setItem("wake_time",v);syncSW(v,sleepTime,notifEnabled,cheatDays);}} style={s.inp}/>
          </div>
          <div style={{marginBottom:"8px"}}>
            <label style={s.lbl}>🌙 Sleep Time (notifications band hojayengi)</label>
            <input type="time" value={sleepTime} onChange={e=>{const v=e.target.value;setSleepTime(v);localStorage.setItem("sleep_time",v);syncSW(wakeTime,v,notifEnabled,cheatDays);}} style={s.inp}/>
          </div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}>
            {!notifEnabled
              ? <button style={s.btn("green")} onClick={enableNotifications}>🔔 Enable Notifications</button>
              : <button style={s.btn("red")} onClick={()=>setNotifEnabled(false)}>🔕 Off Karo</button>
            }
            <button style={s.btn("blue")} onClick={()=>setShowWakeSetup(true)}>⏰ Kal ka Wake Time</button>
          </div>
          {notifEnabled && <button style={{...s.btn("blue"),marginBottom:"8px"}} onClick={()=>sendBrowserNotif("🩺 TargetPG Test","Notification kaam kar raha hai! ✅")}>🧪 Test Notification</button>}
          {notifEnabled
            ? <div style={{fontSize:"11px",color:"#34d399"}}>✅ ON – {wakeTime} se hourly notifications (app band ho toh bhi)</div>
            : <div style={{fontSize:"11px",color:"#f87171"}}>❌ OFF</div>
          }
          <div style={{marginTop:"8px",fontSize:"10px",color:"#4a7a70",background:"#040f0d",padding:"10px",borderRadius:"6px",border:"1px solid #0a2a20",lineHeight:"1.8"}}>
            <b style={{color:"#34d399"}}>📲 Background Notifications Setup (ek baar karo):</b><br/>
            1. Upar "Enable Notifications" dabaao → Allow karo<br/>
            2. Chrome → ⋮ Menu → Settings → Site Settings → Notifications → is site pe tap → Allow<br/>
            3. Android Settings → Apps → Chrome → Battery → "Unrestricted" karo<br/>
            4. Android Settings → Apps → Chrome → Background Activity → ON karo<br/>
            <br/>
            <b style={{color:"#facc15"}}>⚡ Yeh sab karne ke baad app band rehne pe bhi notifications aayengi!</b>
          </div>
        </div>

        <div style={s.card}>
          <label style={s.lbl}>🍕 Cheat Days</label>
          <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
            <div style={{flex:1,background:"#070714",border:"1px solid #1c1c32",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:"22px",fontWeight:700,color:"#fb923c"}}>{Object.keys(cheatDays).length}</div>
              <div style={{fontSize:"9px",color:"#5a4a30"}}>Total</div>
            </div>
            <div style={{flex:1,background:"#070714",border:"1px solid "+(cheatDaysThisWeek()>=1?"#7f1d1d":"#1c1c32"),borderRadius:"8px",padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:"22px",fontWeight:700,color:cheatDaysThisWeek()>=1?"#f87171":"#fb923c"}}>{cheatDaysThisWeek()}/1</div>
              <div style={{fontSize:"9px",color:"#5a4a30"}}>This Week</div>
            </div>
          </div>
          <div style={{fontSize:"11px",color:"#5a6880",marginBottom:"10px",lineHeight:"1.7"}}>
            <b style={{color:"#d97706"}}>Rules:</b> Sirf Sunday • Weekly avg targets ≥ 85% hona chahiye • Max 1/week<br/>
            Recent: {Object.keys(cheatDays).sort().reverse().slice(0,3).join(", ")||"None yet"}
          </div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <button style={s.btn("orange")} onClick={()=>{setSelectedDate(getToday());setTab(0);setShowCheatConfirm(true);}}>🍕 Aaj Cheat Day Declare</button>
            {cheatDays[getToday()]&&<button style={s.btn("red")} onClick={()=>revokeCheatDay(getToday())}>↩ Revoke Today</button>}
          </div>
        </div>

        <div style={s.card}>
          <label style={s.lbl}>🔑 Gemini API Key</label>
          <p style={{fontSize:"11px",color:"#e87070",marginBottom:"8px",lineHeight:"1.6",background:"#2a0a0a",padding:"8px",borderRadius:"6px",border:"1px solid #5a1a1a"}}>
            Free key: <b style={{color:"#60a5fa"}}>aistudio.google.com/apikey</b>
          </p>
          <input type="password" placeholder="AIzaSy..." value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} style={{...s.inp,marginBottom:"10px"}}/>
          <button style={s.btn("green")} onClick={saveApiKey}>💾 Save Key</button>
          {apiKey?<div style={{marginTop:"8px",fontSize:"11px",color:"#34d399"}}>✅ Key saved</div>:<div style={{marginTop:"8px",fontSize:"11px",color:"#f87171"}}>❌ Key nahi</div>}
        </div>

        <div style={s.card}>
          <label style={s.lbl}>19 Subjects Progress</label>
          {SUBJECTS.map((subj,i)=>{
            const allE=Object.values(readingData).flat().filter(e=>e.subject===subj);
            const rp=allE.reduce((a,e)=>a+e.pages,0);
            const sessions=allE.length;
            const lastRead=allE.length>0?allE.sort((a,b)=>b.date.localeCompare(a.date))[0].date:null;
            const qd=Object.values(qbankData).flat().filter(e=>e.subject===subj);
            const qt=qd.reduce((a,e)=>a+e.total,0),qw=qd.reduce((a,e)=>a+e.wrong,0);
            const acc=qt?Math.round((1-qw/qt)*100):null;
            const rc=readCounts[subj]||0;
            const rcLabel=rc===0?"":rc===1?"1st":rc===2?"2nd":rc===3?"3rd":rc+"th";
            const maxPg=Math.max(...SUBJECTS.map(s=>Object.values(readingData).flat().filter(e=>e.subject===s).reduce((a,e)=>a+e.pages,0)),1);
            return(
              <div key={subj} style={{borderBottom:"1px solid #111124",padding:"8px 0"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"3px"}}>
                  <span style={{fontSize:"12px",fontWeight:600,color:rp>0?"#c4b5fd":"#3a3a5a"}}>{i+1}. {subj}</span>
                  <div style={{display:"flex",gap:"4px",flexWrap:"wrap",justifyContent:"flex-end"}}>
                    {rp>0&&<span style={s.badge("green")}>{rp}pg</span>}
                    {rc>0&&<span style={{...s.badge("blue"),color:"#c4b5fd",background:"#1a0a2e",border:"1px solid #5b21b6"}}>{rcLabel}</span>}
                    {acc!==null?<span style={s.badge(acc>=70?"green":"red")}>{acc}%</span>:<span style={{color:"#252535",fontSize:"10px"}}>not started</span>}
                  </div>
                </div>
                {rp>0&&<div style={{height:"3px",borderRadius:"2px",background:"#1e1e35",marginBottom:"3px",overflow:"hidden"}}><div style={{height:"100%",width:Math.round(rp/maxPg*100)+"%",background:"linear-gradient(90deg,#7c3aed,#4ade80)",borderRadius:"2px"}}/></div>}
                {rp>0&&lastRead&&<div style={{fontSize:"10px",color:"#4a5a70"}}>{sessions} sessions • Last: {lastRead}</div>}
              </div>
            );
          })}
        </div>

        <div style={s.card}>
          <label style={s.lbl}>💾 Backup & Restore</label>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}}>
            <button style={{...s.btn("green"),padding:"10px 16px"}} onClick={exportData}>📤 Export (.json)</button>
            <button style={{...s.btn("blue"),padding:"10px 16px"}} onClick={()=>importRef.current.click()}>📥 Import</button>
            <input type="file" ref={importRef} accept=".json" style={{display:"none"}} onChange={importData}/>
          </div>
          <label style={s.lbl}>🗑️ Delete</label>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <button style={s.btn("red")} onClick={()=>{if(window.confirm("Daily logs delete?")){setLogs({});localStorage.removeItem("daily_logs");}}}>Daily</button>
            <button style={s.btn("red")} onClick={()=>{if(window.confirm("Reading data delete?")){setReadingData({});localStorage.removeItem("reading_data");}}}>Reading</button>
            <button style={s.btn("red")} onClick={()=>{if(window.confirm("QBank delete?")){setQbankData({});localStorage.removeItem("qbank_data");}}}>QBank</button>
          </div>
        </div>

        <div style={{...s.card,textAlign:"center"}}>
          <div style={{fontSize:"24px",marginBottom:"6px"}}>🩺</div>
          <div style={{fontSize:"12px",color:"#6a7a98"}}>TargetPG v3.2</div>
          <div style={{fontSize:"10px",color:"#353545",marginTop:"3px"}}>GitHub Pages • NEET PG Edition • Multi-Subject Targets</div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
