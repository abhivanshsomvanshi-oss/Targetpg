    name: "TargetPG",
    short_name: "TargetPG",

    start_url: window.location.href.split('?')[0],
    scope: window.location.pathname.replace(/\/[^\/]*$/, '/') || '/',
    display: "standalone",
    background_color: "#0a0a12",
    theme_color: "#7c3aed",
    orientation: "portrait-primary",
    prefer_related_applications: false,
    icons: [
      { src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==", sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==", sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});

  link.href = url;
  document.head.appendChild(link);
})();

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUBJECTS = ["Anatomy","Physiology","Biochemistry","Pathology","Pharmacology","Microbiology","Forensic Medicine","Community Medicine","ENT","Ophthalmology","Medicine","Surgery","Obstetrics","Gynaecology","Pediatrics","Orthopedics","Radiology","Anesthesia","Psychiatry"];
const TIME_SLOTS = Array.from({length:24},(_,i)=>{
  const s=`${String(i).padStart(2,"0")}:00`;
  const e=i===23?"00:00":`${String(i+1).padStart(2,"0")}:00`;
  return {key:`${s}-${e}`,label:`${s} – ${e}`,hour:i};
});
const getToday=()=>new Date().toISOString().split("T")[0];
const TABS=["📅 Daily","📖 Reading","🧪 QBank","📊 Reports","⚙️ Settings"];
const isWeekend=()=>{const d=new Date().getDay();return d===0||d===6;};

// ── SERVICE WORKER — FULLY INLINE (no sw.js file needed) ──
let _swReg = null;

const SW_SOURCE = `
const DB_NAME = 'medtracker-sw-db';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore('s',{keyPath:'k'});r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej(r.error);});}
async function dbGet(k){try{const db=await openDB();return new Promise(res=>{const r=db.transaction('s','readonly').objectStore('s').get(k);r.onsuccess=()=>res(r.result?r.result.v:null);r.onerror=()=>res(null);});}catch{return null;}}
async function dbSet(k,v){try{const db=await openDB();return new Promise(res=>{const tx=db.transaction('s','readwrite');tx.objectStore('s').put({k,v});tx.oncomplete=res;tx.onerror=res;});}catch{}}
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>{e.waitUntil(clients.claim().then(()=>scheduleCheck()));});
self.addEventListener('message',async e=>{
  if(!e.data)return;
  if(e.data.type==='SCHEDULE_UPDATE'){
    await dbSet('wakeHour',e.data.wakeHour??8);
    await dbSet('sleepHour',e.data.sleepHour??1);
    await dbSet('notifEnabled',e.data.notifEnabled??true);
    await dbSet('cheatDays',e.data.cheatDays??{});
    const cl=await clients.matchAll({type:'window'});
    cl.forEach(c=>c.postMessage({type:'SW_READY'}));
  }
});
function scheduleCheck(){
  const now=new Date();
  const ms=(60-now.getSeconds())*1000-now.getMilliseconds()+500;
  setTimeout(async()=>{await doCheck();scheduleCheck();},ms);
}
async function doCheck(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes();
  if(m>3)return;
  const wakeH=(await dbGet('wakeHour'))??8;
  const sleepH=(await dbGet('sleepHour'))??1;
  const enabled=(await dbGet('notifEnabled'))??false;
  const cheats=(await dbGet('cheatDays'))??{};
  const last=(await dbGet('lastH'))??-1;
  if(!enabled)return;
  const today=new Date().toISOString().split('T')[0];
  if(cheats[today])return;
  if(h===last)return;
  const active=sleepH<wakeH?(h>=wakeH||h<sleepH):(h>=wakeH&&h<sleepH);
  if(!active)return;
  await dbSet('lastH',h);
  const cl=await clients.matchAll({type:'window',includeUncontrolled:true});
  if(cl.some(c=>c.visibilityState==='visible'))return;
  const pH=(h-1+24)%24;
  const lbl=String(pH).padStart(2,'0')+':00 – '+String(h).padStart(2,'0')+':00';
  self.registration.showNotification('⏰ '+lbl+' | TargetPG',{
    body:'Kya kiya is ghante? Tap karo aur fill karo! 📝',
    icon:'https://abhivanshsomvanshi-oss.github.io/Targetpg/icon-192.png',
    badge:'https://abhivanshsomvanshi-oss.github.io/Targetpg/icon-192.png',
    tag:'hourly-log',renotify:true,requireInteraction:true,
    vibrate:[200,100,200,100,400],
    data:{url:'https://abhivanshsomvanshi-oss.github.io/Targetpg/'}
  });
}
self.addEventListener('notificationclick',e=>{
  e.notification.close();
  const url=(e.notification.data&&e.notification.data.url)||'https://abhivanshsomvanshi-oss.github.io/Targetpg/';
  e.waitUntil(clients.matchAll({type:'window',includeUncontrolled:true}).then(cl=>{
    for(const c of cl){if('focus' in c)return c.focus();}
    return clients.openWindow(url);
  }));
});
`;

const registerSW = async () => {
  if(!('serviceWorker' in navigator)) return null;
  try {
    // Create SW from blob — works without separate sw.js file
    const blob = new Blob([SW_SOURCE], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    _swReg = await navigator.serviceWorker.register(swUrl);
    console.log('[TargetPG] SW registered via blob');
    return _swReg;
  } catch(err) {
    console.warn('[TargetPG] SW blob failed:', err.message);
    // Fallback: try sw.js file
    try {
      _swReg = await navigator.serviceWorker.register('./sw.js');
      console.log('[TargetPG] SW registered via file');
      return _swReg;
    } catch(err2) {
      console.warn('[TargetPG] SW file also failed:', err2.message);
      return null;
    }
  }
};

const requestNotifPermission = async () => {
  if(!("Notification" in window)) return false;
  if(Notification.permission === "granted") return true;
  const p = await Notification.requestPermission();
  return p === "granted";
};

const sendBrowserNotif = (title, body) => {
  if(Notification.permission !== "granted"){
    alert("Pehle notifications enable karo Settings mein!");
    return;
  }
  if(_swReg && _swReg.active) {
    _swReg.showNotification(title, {
      body,
      icon: 'https://abhivanshsomvanshi-oss.github.io/Targetpg/icon-192.png',
      tag: 'test-notif',
      requireInteraction: true,
      vibrate: [200, 100, 200]
    }).catch(() => new Notification(title, {body}));
  } else {
    new Notification(title, {body});
  }
};

const updateSWSchedule = async (wakeHour, sleepHour, notifEnabled, cheatDays) => {
  const payload = {
    type: 'SCHEDULE_UPDATE',
    wakeHour: wakeHour ?? 8,
    sleepHour: sleepHour ?? 1,
    notifEnabled: notifEnabled ?? true,
    cheatDays: cheatDays ?? {}
  };
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage(payload);
  } else if (_swReg) {
    const sw = _swReg.active || _swReg.waiting || _swReg.installing;
    if (sw) sw.postMessage(payload);
  }
};

// Register SW on load
registerSW().then(reg => {
  if(reg) console.log('[TargetPG] SW ready');
});

// Listen for SW_LOG_SAVED — when user replies via notification
if('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'SW_LOG_SAVED') {
      // Dispatch custom event so React app can pick it up
      window.dispatchEvent(new CustomEvent('sw-log-saved', { detail: e.data }));
    }
  });
}

function App(){
  const [tab,setTab]=useState(0);
  const [apiKeyInput,setApiKeyInput]=useState(()=>localStorage.getItem("gemini_key")||"");
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("gemini_key")||"");
  const [logs,setLogs]=useState(()=>{try{return JSON.parse(localStorage.getItem("daily_logs")||"{}");}catch{return{};}});
  const [selectedDate,setSelectedDate]=useState(getToday());
  const [readingData,setReadingData]=useState(()=>{try{return JSON.parse(localStorage.getItem("reading_data")||"{}");}catch{return{};}});
  const [rdDate,setRdDate]=useState(getToday());
  const [rdSubject,setRdSubject]=useState(SUBJECTS[0]);
  const [rdPages,setRdPages]=useState("");
  const [rdFromPage,setRdFromPage]=useState("");
  const [rdToPage,setRdToPage]=useState("");
  const [rdVideoHours,setRdVideoHours]=useState("");
  const [rdFlashcards,setRdFlashcards]=useState("");
  const [qbankData,setQbankData]=useState(()=>{try{return JSON.parse(localStorage.getItem("qbank_data")||"{}");}catch{return{};}});
  const [qbankDate,setQbankDate]=useState(getToday());
  const [qbankSubject,setQbankSubject]=useState(SUBJECTS[0]);
  const [qbankTopic,setQbankTopic]=useState("");
  const [qTotal,setQTotal]=useState("");
  const [qWrong,setQWrong]=useState("");
  const [qNotes,setQNotes]=useState("");
  const [screenshotAnalysis,setScreenshotAnalysis]=useState("");
  const [ssLoading,setSsLoading]=useState(false);
  const fileRef=useRef();
  const [reportType,setReportType]=useState("daily");
  // goals: { "2024-01-01": [ {id, subject, targetPages, targetVideoHours, targetQBank, note}, ... ] }
  const [goals,setGoals]=useState(()=>{try{return JSON.parse(localStorage.getItem("daily_goals")||"{}");}catch{return{};}});
  const [readCounts,setReadCounts]=useState(()=>{try{return JSON.parse(localStorage.getItem("read_counts")||"{}");}catch{return{};}});
  const [reportOutput,setReportOutput]=useState("");
  const [reportLoading,setReportLoading]=useState(false);
  const [fullAnalysis,setFullAnalysis]=useState("");
  const [fullLoading,setFullLoading]=useState(false);
  // cheat days: { "2024-01-01": true }
  const [cheatDays,setCheatDays]=useState(()=>{try{return JSON.parse(localStorage.getItem("cheat_days")||"{}");}catch{return{};}});

  // Target form — supports multiple entries per date
  const [tgtDate,setTgtDate]=useState(getToday());
  const [tgtSubject,setTgtSubject]=useState(SUBJECTS[0]);
  const [tgtPages,setTgtPages]=useState("");
  const [tgtVideo,setTgtVideo]=useState("");
  const [tgtQBank,setTgtQBank]=useState("");
  const [tgtQBankAnalyse,setTgtQBankAnalyse]=useState(false);
  const [tgtNote,setTgtNote]=useState("");
  // Pending targets — shown in a preview list before saving all at once
  const [pendingTargets,setPendingTargets]=useState([]);
  // Cheat day: manual unlock or auto-suggestion
  const [cheatDayNote,setCheatDayNote]=useState("");

  // Notification states
  const [showHourlyPopup,setShowHourlyPopup]=useState(false);
  const [popupSlot,setPopupSlot]=useState(null);
  const [popupInput,setPopupInput]=useState("");
  const [wakeTime,setWakeTime]=useState(()=>localStorage.getItem("wake_time")||"08:00");
  const [sleepTime,setSleepTime]=useState(()=>localStorage.getItem("sleep_time")||"01:00");

  // Sync SW schedule whenever key state changes
  const syncSW = (wake, sleep, notif, cheats) => {
    updateSWSchedule(
      parseInt((wake||wakeTime).split(":")[0]),
      parseInt((sleep||sleepTime).split(":")[0]),
      notif??notifEnabled,
      cheats??cheatDays
    );
  };
  const [notifEnabled,setNotifEnabled]=useState(()=>localStorage.getItem("notif_enabled")==="true");
  const [showWakeSetup,setShowWakeSetup]=useState(false);
  const [lastHourPrompted,setLastHourPrompted]=useState(()=>parseInt(localStorage.getItem("last_hour_prompted")||"-1"));
  const [midnightPopupShown,setMidnightPopupShown]=useState(()=>localStorage.getItem("midnight_popup_shown")===getToday());
  const [showCheatConfirm,setShowCheatConfirm]=useState(false);
  const [cheatSuggestionDismissed,setCheatSuggestionDismissed]=useState(false);

  // Chat
  const [chatMessages,setChatMessages]=useState([]);
  const [chatInput,setChatInput]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const chatEndRef=useRef();
  const importRef=useRef();

  useEffect(()=>localStorage.setItem("daily_logs",JSON.stringify(logs)),[logs]);
  useEffect(()=>localStorage.setItem("qbank_data",JSON.stringify(qbankData)),[qbankData]);
  useEffect(()=>localStorage.setItem("reading_data",JSON.stringify(readingData)),[readingData]);
  useEffect(()=>localStorage.setItem("daily_goals",JSON.stringify(goals)),[goals]);
  useEffect(()=>localStorage.setItem("read_counts",JSON.stringify(readCounts)),[readCounts]);
  useEffect(()=>localStorage.setItem("notif_enabled",notifEnabled),[notifEnabled]);
  // Sync SW on mount — send current schedule to SW
  useEffect(()=>{
    if(notifEnabled) syncSW(wakeTime,sleepTime,true,cheatDays);
  // eslint-disable-next-line
  },[]);
  useEffect(()=>localStorage.setItem("last_hour_prompted",lastHourPrompted),[lastHourPrompted]);
  useEffect(()=>localStorage.setItem("cheat_days",JSON.stringify(cheatDays)),[cheatDays]);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[chatMessages]);

  // Hourly notification check
  useEffect(()=>{
    if(!notifEnabled) return;
    const check=()=>{
      const now=new Date();
      const h=now.getHours(),m=now.getMinutes();
      const wakeH=parseInt(wakeTime.split(":")[0]);
      if(h===23&&m>=45&&!midnightPopupShown){
        setShowWakeSetup(true);setMidnightPopupShown(true);
        localStorage.setItem("midnight_popup_shown",getToday());
        sendBrowserNotif("🩺 TargetPG","Kal ka wake-up time set karo!");
      }
      if(h>=wakeH&&m<=7&&h!==lastHourPrompted&&!cheatDays[getToday()]){
        // h baje alarm baja → pichla slot (h-1 to h) fill karna hai
        const prevH=h>0?h-1:23;
        const slot=TIME_SLOTS[prevH];
        setPopupSlot(slot);setPopupInput("");setShowHourlyPopup(true);
        setLastHourPrompted(h);
        sendBrowserNotif(`⏰ ${slot.label}`,"Kya kiya? Fill karo!");
      }
    };
    check();
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[notifEnabled,wakeTime,lastHourPrompted,midnightPopupShown,cheatDays]);

  const saveApiKey=()=>{localStorage.setItem("gemini_key",apiKeyInput);setApiKey(apiKeyInput);alert("Key saved!");};

  const exportData=()=>{
    const data={version:"3.1",exportDate:new Date().toISOString(),daily_logs:logs,reading_data:readingData,qbank_data:qbankData,daily_goals:goals,read_counts:readCounts,cheat_days:cheatDays};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`TargetPG_Backup_${getToday()}.json`;a.click();URL.revokeObjectURL(url);
  };
  const importData=(e)=>{
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!window.confirm("Purana data replace hoga. Sure?")) return;
        if(data.daily_logs){setLogs(data.daily_logs);localStorage.setItem("daily_logs",JSON.stringify(data.daily_logs));}
        if(data.reading_data){setReadingData(data.reading_data);localStorage.setItem("reading_data",JSON.stringify(data.reading_data));}
        if(data.qbank_data){setQbankData(data.qbank_data);localStorage.setItem("qbank_data",JSON.stringify(data.qbank_data));}
        if(data.daily_goals){setGoals(data.daily_goals);localStorage.setItem("daily_goals",JSON.stringify(data.daily_goals));}
        if(data.read_counts){setReadCounts(data.read_counts);localStorage.setItem("read_counts",JSON.stringify(data.read_counts));}
        if(data.cheat_days){setCheatDays(data.cheat_days);localStorage.setItem("cheat_days",JSON.stringify(data.cheat_days));}
        alert("Data import ho gaya!");
      }catch(err){alert("Error: "+err.message);}
    };
    reader.readAsText(file);e.target.value="";
  };

  // ── TARGET FUNCTIONS ──
  const addToPending=()=>{
    if(!tgtPages&&!tgtVideo&&!tgtQBank){alert("Pages, Video ya QBank — kuch toh bharo!");return;}
    const entry={id:Date.now(),subject:tgtSubject,targetPages:tgtPages?+tgtPages:0,targetVideoHours:tgtVideo?+tgtVideo:0,targetQBank:tgtQBank?+tgtQBank:0,qbankAnalyse:tgtQBankAnalyse,note:tgtNote.trim(),date:tgtDate};
    setPendingTargets(prev=>[...prev,entry]);
    setTgtPages("");setTgtVideo("");setTgtQBank("");setTgtQBankAnalyse(false);setTgtNote("");
  };
  const removePending=(id)=>setPendingTargets(prev=>prev.filter(p=>p.id!==id));
  const saveAllTargets=()=>{
    if(!pendingTargets.length){alert("Pehle kuch targets add karo!");return;}
    setGoals(prev=>({...prev,[tgtDate]:[...(prev[tgtDate]||[]),...pendingTargets]}));
    setPendingTargets([]);
    alert(`✅ ${pendingTargets.length} target(s) saved for ${tgtDate}!`);
  };
  const addTarget=()=>{
    if(!tgtPages&&!tgtVideo&&!tgtQBank){alert("Pages, Video ya QBank — kuch toh bharo!");return;}
    const newEntry={id:Date.now(),subject:tgtSubject,targetPages:tgtPages?+tgtPages:0,targetVideoHours:tgtVideo?+tgtVideo:0,targetQBank:tgtQBank?+tgtQBank:0,qbankAnalyse:tgtQBankAnalyse,note:tgtNote.trim(),date:tgtDate};
    setGoals(prev=>({...prev,[tgtDate]:[...(prev[tgtDate]||[]),newEntry]}));
    setTgtPages("");setTgtVideo("");setTgtQBank("");setTgtQBankAnalyse(false);setTgtNote("");
  };
  const deleteGoal=(date,id)=>setGoals(prev=>({...prev,[date]:(prev[date]||[]).filter(g=>g.id!==id)}));

  // Progress for a specific target entry
  const getTargetProgress=(tgt,date)=>{
    const rdEntries=(readingData[date]||[]).filter(e=>e.subject===tgt.subject);
    const qEntries=(qbankData[date]||[]).filter(e=>e.subject===tgt.subject);
    const actualPages=rdEntries.reduce((a,e)=>a+(e.pages||0),0);
    const actualVideo=rdEntries.reduce((a,e)=>a+(e.videoHours||0),0);
    const actualQBank=qEntries.reduce((a,e)=>a+e.total,0);
    // For QBank+Analyse: check if any entry has notes (analysis done)
    const actualAnalyse=tgt.qbankAnalyse?qEntries.filter(e=>e.notes&&e.notes.trim().length>5).length>0:null;
    const pgPct=tgt.targetPages>0?Math.min(100,Math.round(actualPages/tgt.targetPages*100)):null;
    const vidPct=tgt.targetVideoHours>0?Math.min(100,Math.round(actualVideo/tgt.targetVideoHours*100)):null;
    const qPct=tgt.targetQBank>0?Math.min(100,Math.round(actualQBank/tgt.targetQBank*100)):null;
    const analysePct=tgt.qbankAnalyse?(actualAnalyse?100:0):null;
    const pcts=[pgPct,vidPct,qPct,analysePct].filter(p=>p!==null);
    const overall=pcts.length>0?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):0;

          <div style={s.grid3}>
            <div style={{background:"#070714",border:"1px solid #1a2a1a",borderRadius:"8px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"22px",fontWeight:700,color:"#4ade80"}}>{rdStats.totalPages}</div><div style={{fontSize:"9px",color:"#3a6a3a"}}>Pages</div></div>
            <div style={{background:"#070714",border:"1px solid #1a2a3a",borderRadius:"8px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"22px",fontWeight:700,color:"#60a5fa"}}>{rdStats.totalVideoHours||0}</div><div style={{fontSize:"9px",color:"#3a4a6a"}}>Video Hrs</div></div>
            <div style={{background:"#070714",border:"1px solid #2a1a2a",borderRadius:"8px",padding:"10px",textAlign:"center"}}><div style={{fontSize:"22px",fontWeight:700,color:"#f472b6"}}>{rdStats.totalFlashcards||0}</div><div style={{fontSize:"9px",color:"#6a3a5a"}}>Flashcards</div></div>
          </div>
          <div style={{marginTop:"10px"}}>
            {Object.entries(rdStats.bySubject).sort((a,b)=>b[1].pages-a[1].pages).map(([subj,data])=>{
              const maxPg=Math.max(...Object.values(rdStats.bySubject).map(d=>d.pages),1);
              return<div key={subj} style={{marginBottom:"8px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"2px"}}>
                  <span style={{color:"#a0d8a0"}}>{subj}</span>
                  <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                    {(data.pages||0)>0&&<span style={s.badge("green")}>{data.pages}pg</span>}
                    {(data.videoHours||0)>0&&<span style={s.badge("blue")}>{data.videoHours}hr</span>}
                    <span style={s.badge("blue")}>{data.sessions}x</span>
                  </div>
                </div>
                <div style={s.bar(Math.round((data.pages||0)/maxPg*100),"#22c55e")}/>
              </div>;
            })}
          </div>
        </div>}
      </div>}

      {/* ━━ TAB 2: QBANK ━━ */}
      {tab===2&&<div style={s.page}>
        <div style={s.card}>
          <label style={s.lbl}>➕ QBank Entry</label>
          <div style={{marginBottom:"8px"}}><label style={s.lbl}>Date</label><input type="date" value={qbankDate} onChange={e=>setQbankDate(e.target.value)} style={s.inp}/></div>
          <div style={{marginBottom:"8px"}}><label style={s.lbl}>Subject</label><select value={qbankSubject} onChange={e=>setQbankSubject(e.target.value)} style={s.sel}>{SUBJECTS.map(sub=><option key={sub}>{sub}</option>)}</select></div>
          <div style={{marginBottom:"8px"}}><label style={s.lbl}>Topic</label><input placeholder="e.g. Brachial Plexus" value={qbankTopic} onChange={e=>setQbankTopic(e.target.value)} style={s.inp}/></div>
          <div style={s.row}>
            <div style={{flex:1}}><label style={s.lbl}>Total Qs</label><input type="number" min="0" placeholder="50" value={qTotal} onChange={e=>setQTotal(e.target.value)} style={s.inp}/></div>
            <div style={{flex:1}}><label style={s.lbl}>Wrong</label><input type="number" min="0" placeholder="12" value={qWrong} onChange={e=>setQWrong(e.target.value)} style={s.inp}/></div>
          </div>
          <div style={{marginBottom:"10px"}}><label style={s.lbl}>Notes</label><textarea placeholder="Weak concept?" value={qNotes} onChange={e=>setQNotes(e.target.value)} style={s.ta}/></div>
          <button style={s.btn("blue")} onClick={addQBankEntry}>✅ Save</button>
        </div>

        <div style={s.card}>
          <label style={s.lbl}>📸 Screenshots → AI</label>
          <input type="file" ref={fileRef} multiple accept="image/*" style={{display:"none"}} onChange={e=>analyseScreenshots(e.target.files)}/>
          <button style={s.btn("green")} onClick={()=>fileRef.current.click()} disabled={ssLoading}>{ssLoading?"🔄 Analysing...":"📤 Screenshots Upload"}</button>
          {screenshotAnalysis&&<div style={s.aiBox}><div style={{fontSize:"9px",color:"#3a5a3a",marginBottom:"6px"}}>🔍 SCREENSHOT ANALYSIS</div>{screenshotAnalysis}</div>}
        </div>

        {todayQBank.length>0&&<div style={s.card}>
          <label style={s.lbl}>📋 {qbankDate} Entries</label>
          {todayQBank.map(e=><div key={e.id} style={{borderBottom:"1px solid #151525",padding:"7px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:"12px",fontWeight:600,color:"#c4b5fd"}}>{e.subject}</span>
              <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                <span style={s.badge(e.total>0&&e.wrong/e.total>0.5?"red":"green")}>{e.wrong}/{e.total}W</span>
                <button onClick={()=>deleteQBankEntry(qbankDate,e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#5a2a2a",fontSize:"14px"}}>✕</button>
              </div>
            </div>
            <div style={{fontSize:"11px",color:"#7a8aa8",marginTop:"2px"}}>{e.topic}</div>
            {e.total>0&&<div style={s.bar(Math.min(100,e.wrong/e.total*100))}/>}
          </div>)}
        </div>}

        {mistakes.length>0&&<div style={s.card}>
          <label style={s.lbl}>🔴 Top Weak Topics</label>
          {mistakes.map((m,i)=><div key={i} style={{marginBottom:"8px"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px"}}>
              <span style={{color:"#c4b5fd",flex:1}}>{m.subject} <span style={{color:"#6a7a98"}}>→ {m.topic}</span></span>
              <span style={s.badge("red")}>{m.wrong}W</span>
            </div>
            <div style={s.bar(Math.min(100,m.total>0?m.wrong/m.total*100:100))}/>
          </div>)}
        </div>}
      </div>}

      {/* ━━ TAB 3: REPORTS ━━ */}
      {tab===3&&<div style={s.page}>
        <div style={s.grid2}>
          {[
            {l:"Study Days",v:Object.keys(logs).length,col:"#a78bfa"},
            {l:"Total Pages",v:rdStats.totalPages,col:"#4ade80"},
            {l:"Video Hrs",v:rdStats.totalVideoHours,col:"#60a5fa"},
            {l:"Flashcards",v:rdStats.totalFlashcards,col:"#f472b6"},
            {l:"QBank Qs",v:Object.values(qbankData).flat().reduce((a,e)=>a+e.total,0),col:"#fbbf24"},
            {l:"Cheat Days",v:Object.keys(cheatDays).length,col:"#fb923c"},
          ].map((x,i)=>(
            <div key={i} style={{...s.card,textAlign:"center",padding:"12px",marginBottom:0}}>
              <div style={{fontSize:"20px",fontWeight:700,color:x.col,margin:"2px 0"}}>{x.v}</div>
              <div style={{fontSize:"10px",color:"#3a4a60"}}>{x.l}</div>
            </div>
          ))}
        </div>

        {(()=>{
          const last7=[...Array(7)].map((_,i)=>{
            const d=new Date();d.setDate(d.getDate()-6+i);
            const key=d.toISOString().split("T")[0];
            const rd=readingData[key]||[],qb=qbankData[key]||[];
            const dayGoals=goals[key]||[];
            const overallP=getDayOverallPct(key);
            return{day:d.toLocaleDateString("en",{weekday:"short"}),pages:rd.reduce((a,e)=>a+(e.pages||0),0),qTotal:qb.reduce((a,e)=>a+e.total,0),activeHours:Object.values(logs[key]||{}).filter(Boolean).length,isCheat:!!cheatDays[key],overallPct:overallP};
          });
          const maxPg=Math.max(...last7.map(d=>d.pages),1),maxQs=Math.max(...last7.map(d=>d.qTotal),1);
          return(
            <div style={s.card}>
              <label style={s.lbl}>Last 7 Days</label>
              <div style={{fontSize:"10px",color:"#5a6880",marginBottom:"6px"}}>🟢 Pages  🟣 QBank  🟠 Cheat</div>
              <div style={{display:"flex",gap:"4px",alignItems:"flex-end",height:"80px",marginBottom:"10px"}}>
                {last7.map((d,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",height:"100%",justifyContent:"flex-end"}}>
                    {d.isCheat
                      ? <div style={{width:"100%",height:"40px",background:"#d97706",borderRadius:"4px 4px 0 0",opacity:0.7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>🍕</div>
                      : <div style={{width:"100%",display:"flex",gap:"1px",alignItems:"flex-end",height:"65px"}}>
                          <div style={{flex:1,background:"#22c55e",borderRadius:"2px 2px 0 0",height:Math.max(4,Math.round(d.pages/maxPg*65))+"px",opacity:0.9}}/>
                          <div style={{flex:1,background:"#7c3aed",borderRadius:"2px 2px 0 0",height:Math.max(d.qTotal>0?4:0,Math.round(d.qTotal/maxQs*65))+"px",opacity:0.9}}/>
                        </div>
                    }
                    <div style={{fontSize:"8px",color:"#3a4a60"}}>{d.day}</div>
                    {d.overallPct!==null&&!d.isCheat&&<div style={{fontSize:"7px",color:d.overallPct>=80?"#4ade80":d.overallPct>=50?"#fbbf24":"#f87171"}}>{d.overallPct}%</div>}
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        <div style={s.card}>
          <label style={s.lbl}>📊 Report</label>
          <div style={{display:"flex",gap:"6px",marginBottom:"12px",flexWrap:"wrap"}}>
            {[["daily","📅 Daily"],["weekly","📆 Weekly"],["monthly","🗓️ Monthly"]].map(([t,l])=>(
              <button key={t} onClick={()=>setReportType(t)} style={{...s.btn(reportType===t?"purple":"blue"),opacity:reportType===t?1:0.55}}>{l}</button>
            ))}
          </div>
          <button style={{...s.btn("purple"),width:"100%",padding:"12px",fontSize:"13px"}} onClick={generateReport} disabled={reportLoading}>{reportLoading?"🔄 Generating...":"⚡ Report Generate Karo"}</button>
        </div>

        {reportOutput&&<div style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",flexWrap:"wrap",gap:"8px"}}>
            <label style={s.lbl}>{reportType.toUpperCase()} REPORT</label>
            <div style={{display:"flex",gap:"6px"}}>
              <button style={s.btn("blue")} onClick={()=>{const el=document.createElement("a");el.href="data:text/plain;charset=utf-8,"+encodeURIComponent(reportOutput);el.download=`MBBS_${reportType}_${getToday()}.txt`;el.click();}}>💾 .txt</button>
            </div>
          </div>
          <div style={s.aiBox}>{reportOutput}</div>
        </div>}
      </div>}

      {/* ━━ TAB 4: SETTINGS ━━ */}
      {tab===4&&<div style={s.page}>
        <div style={s.card}>
          <label style={s.lbl}>🔔 Hourly Reminders</label>
          <div style={{marginBottom:"8px"}}>
            <label style={s.lbl}>Wake-up Time (reminders isi se start honge)</label>
            <input type="time" value={wakeTime} onChange={e=>{const v=e.target.value;setWakeTime(v);localStorage.setItem("wake_time",v);syncSW(v,sleepTime,notifEnabled,cheatDays);}} style={s.inp}/>
          </div>
          <div style={{marginBottom:"8px"}}>
            <label style={s.lbl}>🌙 Sleep Time (notifications band hojayengi)</label>
            <input type="time" value={sleepTime} onChange={e=>{const v=e.target.value;setSleepTime(v);localStorage.setItem("sleep_time",v);syncSW(wakeTime,v,notifEnabled,cheatDays);}} style={s.inp}/>
          </div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}>
            {!notifEnabled
              ? <button style={s.btn("green")} onClick={enableNotifications}>🔔 Enable Notifications</button>
              : <button style={s.btn("red")} onClick={()=>setNotifEnabled(false)}>🔕 Off Karo</button>
            }
            <button style={s.btn("blue")} onClick={()=>setShowWakeSetup(true)}>⏰ Kal ka Wake Time</button>
          </div>
          {notifEnabled && <button style={{...s.btn("blue"),marginBottom:"8px"}} onClick={()=>sendBrowserNotif("🩺 TargetPG Test","Notification kaam kar raha hai! ✅")}>🧪 Test Notification</button>}
          {notifEnabled
            ? <div style={{fontSize:"11px",color:"#34d399"}}>✅ ON – {wakeTime} se hourly notifications (app band ho toh bhi)</div>
            : <div style={{fontSize:"11px",color:"#f87171"}}>❌ OFF</div>
          }
          <div style={{marginTop:"8px",fontSize:"10px",color:"#4a7a70",background:"#040f0d",padding:"10px",borderRadius:"6px",border:"1px solid #0a2a20",lineHeight:"1.8"}}>
            <b style={{color:"#34d399"}}>📲 Background Notifications Setup (ek baar karo):</b><br/>
            1. Upar "Enable Notifications" dabaao → Allow karo<br/>
            2. Chrome → ⋮ Menu → Settings → Site Settings → Notifications → is site pe tap → Allow<br/>
            3. Android Settings → Apps → Chrome → Battery → "Unrestricted" karo<br/>
            4. Android Settings → Apps → Chrome → Background Activity → ON karo<br/>
            <br/>
            <b style={{color:"#facc15"}}>⚡ Yeh sab karne ke baad app band rehne pe bhi notifications aayengi!</b>
          </div>
        </div>

        <div style={s.card}>
          <label style={s.lbl}>🍕 Cheat Days</label>
          <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
            <div style={{flex:1,background:"#070714",border:"1px solid #1c1c32",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:"22px",fontWeight:700,color:"#fb923c"}}>{Object.keys(cheatDays).length}</div>
              <div style={{fontSize:"9px",color:"#5a4a30"}}>Total</div>
            </div>
            <div style={{flex:1,background:"#070714",border:"1px solid "+(cheatDaysThisWeek()>=1?"#7f1d1d":"#1c1c32"),borderRadius:"8px",padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:"22px",fontWeight:700,color:cheatDaysThisWeek()>=1?"#f87171":"#fb923c"}}>{cheatDaysThisWeek()}/1</div>
              <div style={{fontSize:"9px",color:"#5a4a30"}}>This Week</div>
            </div>
          </div>
          <div style={{fontSize:"11px",color:"#5a6880",marginBottom:"10px",lineHeight:"1.7"}}>
            <b style={{color:"#d97706"}}>Rules:</b> Sirf Sunday • Weekly avg targets ≥ 85% hona chahiye • Max 1/week<br/>
            Recent: {Object.keys(cheatDays).sort().reverse().slice(0,3).join(", ")||"None yet"}
          </div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <button style={s.btn("orange")} onClick={()=>{setSelectedDate(getToday());setTab(0);setShowCheatConfirm(true);}}>🍕 Aaj Cheat Day Declare</button>
            {cheatDays[getToday()]&&<button style={s.btn("red")} onClick={()=>revokeCheatDay(getToday())}>↩ Revoke Today</button>}
          </div>
        </div>

        <div style={s.card}>
          <label style={s.lbl}>🔑 Gemini API Key</label>
          <p style={{fontSize:"11px",color:"#e87070",marginBottom:"8px",lineHeight:"1.6",background:"#2a0a0a",padding:"8px",borderRadius:"6px",border:"1px solid #5a1a1a"}}>
            Free key: <b style={{color:"#60a5fa"}}>aistudio.google.com/apikey</b>
          </p>
          <input type="password" placeholder="AIzaSy..." value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} style={{...s.inp,marginBottom:"10px"}}/>
          <button style={s.btn("green")} onClick={saveApiKey}>💾 Save Key</button>
          {apiKey?<div style={{marginTop:"8px",fontSize:"11px",color:"#34d399"}}>✅ Key saved</div>:<div style={{marginTop:"8px",fontSize:"11px",color:"#f87171"}}>❌ Key nahi</div>}
        </div>

        <div style={s.card}>
          <label style={s.lbl}>19 Subjects Progress</label>
          {SUBJECTS.map((subj,i)=>{
            const allE=Object.values(readingData).flat().filter(e=>e.subject===subj);
            const rp=allE.reduce((a,e)=>a+e.pages,0);
            const sessions=allE.length;
            const lastRead=allE.length>0?allE.sort((a,b)=>b.date.localeCompare(a.date))[0].date:null;
            const qd=Object.values(qbankData).flat().filter(e=>e.subject===subj);
            const qt=qd.reduce((a,e)=>a+e.total,0),qw=qd.reduce((a,e)=>a+e.wrong,0);
            const acc=qt?Math.round((1-qw/qt)*100):null;
            const rc=readCounts[subj]||0;
            const rcLabel=rc===0?"":rc===1?"1st":rc===2?"2nd":rc===3?"3rd":rc+"th";
            const maxPg=Math.max(...SUBJECTS.map(s=>Object.values(readingData).flat().filter(e=>e.subject===s).reduce((a,e)=>a+e.pages,0)),1);
            return(
              <div key={subj} style={{borderBottom:"1px solid #111124",padding:"8px 0"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"3px"}}>
                  <span style={{fontSize:"12px",fontWeight:600,color:rp>0?"#c4b5fd":"#3a3a5a"}}>{i+1}. {subj}</span>
                  <div style={{display:"flex",gap:"4px",flexWrap:"wrap",justifyContent:"flex-end"}}>
                    {rp>0&&<span style={s.badge("green")}>{rp}pg</span>}
                    {rc>0&&<span style={{...s.badge("blue"),color:"#c4b5fd",background:"#1a0a2e",border:"1px solid #5b21b6"}}>{rcLabel}</span>}
                    {acc!==null?<span style={s.badge(acc>=70?"green":"red")}>{acc}%</span>:<span style={{color:"#252535",fontSize:"10px"}}>not started</span>}
                  </div>
                </div>
                {rp>0&&<div style={{height:"3px",borderRadius:"2px",background:"#1e1e35",marginBottom:"3px",overflow:"hidden"}}><div style={{height:"100%",width:Math.round(rp/maxPg*100)+"%",background:"linear-gradient(90deg,#7c3aed,#4ade80)",borderRadius:"2px"}}/></div>}
                {rp>0&&lastRead&&<div style={{fontSize:"10px",color:"#4a5a70"}}>{sessions} sessions • Last: {lastRead}</div>}
              </div>
            );
          })}
        </div>

        <div style={s.card}>
          <label style={s.lbl}>💾 Backup & Restore</label>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}}>
            <button style={{...s.btn("green"),padding:"10px 16px"}} onClick={exportData}>📤 Export (.json)</button>
            <button style={{...s.btn("blue"),padding:"10px 16px"}} onClick={()=>importRef.current.click()}>📥 Import</button>
            <input type="file" ref={importRef} accept=".json" style={{display:"none"}} onChange={importData}/>
          </div>
          <label style={s.lbl}>🗑️ Delete</label>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <button style={s.btn("red")} onClick={()=>{if(window.confirm("Daily logs delete?")){setLogs({});localStorage.removeItem("daily_logs");}}}>Daily</button>
            <button style={s.btn("red")} onClick={()=>{if(window.confirm("Reading data delete?")){setReadingData({});localStorage.removeItem("reading_data");}}}>Reading</button>
            <button style={s.btn("red")} onClick={()=>{if(window.confirm("QBank delete?")){setQbankData({});localStorage.removeItem("qbank_data");}}}>QBank</button>
          </div>
        </div>

        <div style={{...s.card,textAlign:"center"}}>
          <div style={{fontSize:"24px",marginBottom:"6px"}}>🩺</div>
          <div style={{fontSize:"12px",color:"#6a7a98"}}>TargetPG v3.2</div>
          <div style={{fontSize:"10px",color:"#353545",marginTop:"3px"}}>GitHub Pages • NEET PG Edition • Multi-Subject Targets</div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
